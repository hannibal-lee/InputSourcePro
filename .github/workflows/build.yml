name: Build app

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Release
        run: |
          set -euo pipefail
          xcodebuild \
            -project "Input Source Pro.xcodeproj" \
            -scheme "Input Source Pro" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package app
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release/Input Source Pro 10.15.app"
          test -d "$APP_PATH"
          mkdir -p dist
          ditto -c -k --keepParent "$APP_PATH" "dist/Input Source Pro 10.15-${GITHUB_REF_NAME}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Input Source Pro 10.15-${{ github.ref_name }}
          path: dist/*.zip
