name: Build app

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Release
        run: |
          set -uo pipefail
          mkdir -p build
          if ! xcodebuild \
            -project "Input Source Pro.xcodeproj" \
            -scheme "Input Source Pro" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY_NAME=- \
            build 2>&1 | tee build/xcodebuild.log; then
            grep -E "error:" build/xcodebuild.log | tail -20 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi

      - name: Package unsigned DMG
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release/Input Source Pro 10.15.app"
          test -d "$APP_PATH"
          mkdir -p dist
          DMG_ROOT="$(mktemp -d)"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"
          hdiutil create \
            -volname "Input Source Pro 10.15" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "dist/Input Source Pro 10.15-${GITHUB_REF_NAME}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Input Source Pro 10.15-${{ github.ref_name }}
          path: dist/*.dmg
